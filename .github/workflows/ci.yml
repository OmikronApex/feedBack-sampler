name: CI

on:
  push:
  pull_request:

env:
  PLUGINVAL_VERSION: "1.0.4"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            pluginval_zip: pluginval_Windows.zip
            pluginval_bin: ./pluginval.exe
          - name: macos
            os: macos-latest
            pluginval_zip: pluginval_macOS.zip
            pluginval_bin: pluginval.app/Contents/MacOS/pluginval
          - name: linux
            os: ubuntu-latest
            pluginval_zip: pluginval_Linux.zip
            pluginval_bin: ./pluginval

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxrender-dev libfreetype6-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev xvfb

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Locate VST3 artifact
        id: vst3
        shell: bash
        run: |
          matches=$(find build/plugin -maxdepth 6 -iname "*.vst3")
          count=$(printf '%s' "$matches" | grep -c . || true)
          if [ "$count" -eq 0 ]; then
            echo "No .vst3 artifact found under build/plugin" >&2
            exit 1
          elif [ "$count" -gt 1 ]; then
            echo "Expected exactly one .vst3 artifact under build/plugin, found $count:" >&2
            echo "$matches" >&2
            exit 1
          fi
          echo "path=$matches" >> "$GITHUB_OUTPUT"

      - name: Download pluginval
        shell: bash
        run: |
          curl -fL --retry 5 --retry-delay 10 --retry-all-errors -o pluginval.zip \
            "https://github.com/Tracktion/pluginval/releases/download/v${PLUGINVAL_VERSION}/${{ matrix.pluginval_zip }}"
          unzip -o pluginval.zip
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "${{ matrix.pluginval_bin }}"
          fi

      - name: Run pluginval (strictness 5)
        shell: bash
        timeout-minutes: 10
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a "${{ matrix.pluginval_bin }}" --strictness-level 5 --validate "${{ steps.vst3.outputs.path }}"
          else
            "${{ matrix.pluginval_bin }}" --strictness-level 5 --validate "${{ steps.vst3.outputs.path }}"
          fi

  # Story 1.3 (NFR-4, AD-10): parser/frontend tests + the deterministic fuzz
  # pass under ASan/UBSan on Linux. The plugin is not built here — this job
  # exists to catch memory errors and UB in the parsing/lowering attack
  # surface, which the release matrix above cannot see.
  sanitize:
    name: linux-asan-ubsan
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxrender-dev libfreetype6-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev

      - name: Configure (ASan+UBSan)
        run: >
          cmake -B build-san -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"

      - name: Build tests and fuzz runner
        run: cmake --build build-san --target fbsampler-tests sfz-fuzz-replay --parallel

      - name: Run tests under sanitizers
        # ad6_guard_negative re-runs a nested CMake configure that inherits the
        # sanitizer CMAKE_*_FLAGS and fails for unrelated reasons; it is a
        # configure-time guard with no runtime code, so sanitizers add nothing.
        # It still runs on all three regular matrix legs.
        run: ctest --test-dir build-san --output-on-failure -E ad6_guard_negative
